name = "didbox402"
main = "src/index.ts"
compatibility_date = "2024-05-11"
compatibility_flags = [ "nodejs_compat" ]

[vars]
DEV_MODE = "true"
# IMPORTANT (spec 10.2): Change this to a high-entropy secret (≥128 bits) before production.
SERVICE_SALT = "test_salt"
BASE_RATE_PER_MB_HOUR = "100"
INBOX_CREATION_FEE = "1000"

# v0.7.0+ Node Identity (REQUIRED in non-dev environments)
# NODE_SIGNING_PRIVATE_KEY = "64 hex characters (32 bytes Ed25519 private key)"
# NODE_DID = "did:key:z6Mk..."  # Must correspond to the private key above

# Real Lightning (L402) via Alby
# ALBY_API_KEY = "your_alby_api_key_here"

# x402 (USDC) Configuration
# USDC_RPC_URL = "https://mainnet.base.org"
# USDC_WALLET_ADDRESS = "0xYourUSDCWallet"
# USDC_CONTRACT_ADDRESS = "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913"  # Base USDC (optional)
# SATS_PER_USD = "100000"   # How many satoshis = 1 USD (for x402 amount conversion)

[[r2_buckets]]
binding = "STORAGE_BUCKET"
bucket_name = "didbox402-storage"

[[d1_databases]]
binding = "DB"
database_name = "didbox402-db"
database_id = "PLACEHOLDER"
