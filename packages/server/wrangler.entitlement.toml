name = "didbox402-entitlement"
main = "src/index.ts"
compatibility_date = "2024-05-11"
compatibility_flags = [ "nodejs_compat" ]

[vars]
DEV_MODE = "true"
SERVICE_SALT = "test_salt"
BASE_RATE_PER_MB_HOUR = "100"
INBOX_CREATION_FEE = "1000"
BILLING_MODE = "entitlement"
# SHA-256("conformance-secret") for key dbx_ent_test.conformance-secret
ENTITLEMENT_KEY_HASHES = "test:d0d18cc0999e75e555481aad963ba46c6b8c8643a4f2cc8909d0a7dbcaa3f8d1"

[[r2_buckets]]
binding = "STORAGE_BUCKET"
bucket_name = "didbox402-storage-entitlement"

[[d1_databases]]
binding = "DB"
database_name = "didbox402-db-entitlement"
database_id = "PLACEHOLDER-ENT"